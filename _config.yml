# =============================================================================
# Features
# =============================================================================

features:
  - title: 方便切換表情齒盤
    image: emoji-keyboard
    description: 台語齒盤內底寄表情齒盤，拍字兼拍表情，加添拍字 ê 趣味。

  - title: 白話字、台羅、英文方便切換
    image: english-keyboard
    description: 齒盤面頂有揤鈕通揤，白話字、台羅、英語切換誠利便。

  - title: 3 段式大小寫切換
    description:
      - 一般 ê 情況第 1 个字會自動大寫，shift 揤鈕會反烏，但是若「自動開關」有關起來，著愛家己揤 shift 揤鈕，第 1 個字才會變大寫。
      - 連紲揤 Shift 鍵 2 改是 Caps Lock 模式，shift 揤鈕是烏色，圖示嘛無仝款，這時陣拍出來 ê 字攏會變大寫，閣揤 1 改才會改轉來小寫。

  - title: 支持 PhahTaigi 佈局
    description: 利便習慣 PhahTaigi 齒盤 ê 使用者

  - title: 支持 Open 粉圓字骨
    description: 正港台語字骨，罕得 ê 字嘛方便看

  - title: 台灣人寫 ê 拍字演算法
    description: 專為台語設計，無用中国人寫 ê 拍字 ia̋n-jín

  - title: 保護你 ê 資料
    description: 資料攏留佇你 ê 手機仔內底，無收你 ê 資料

  - title: 定期加入上新 ê 詞庫
    description: 台語新詞嘛攏揣有

  - title: 定期升級維護 APP
    description: 改進使用體驗，修理資安破空

  - title: 支持台語教育使用
    description: 免錢、無廣告、袂做付費功能

