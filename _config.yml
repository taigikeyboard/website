about:
  title: 關於齒盤
  paragraphs:
    - 台語齒盤是專為台語使用者設計 ê 手機仔拍字家私，支持 iOS 佮 Android 2 種系統。無論你習慣用白話字、教育部台羅，抑是直接拍出漢字，台語齒盤攏會當滿足你 ê 需要。
    - 台語齒盤保證免費、無廣告，以後袂做付費功能。咱 ê 目標是 thui-sak 台語教育，予逐家輕輕鬆鬆用母語來拍字、寫文章、傳消息。

# =============================================================================
# Content - Screenshots Section
# =============================================================================

screenshots:
  platform_note: Android 佮 iOS 齒盤外觀有小可仔無仝，毋過使用體驗攏仝款。

# =============================================================================
# Content - How to Type Section
# =============================================================================

how_to_type:
  notes:
    - 若拍漢字，會自動使用全形標點符號，拍羅馬字會自動切去半形標點符號，建議 ê 候選詞會顯示佇頂頭，嘛會使褫開看較清楚。

# =============================================================================
# Content - How to Use Section
# =============================================================================

how_to_use:
  steps:
    - description: 【設定】>【一般/系統】>【齒盤】
      image: setup-1
      alt: 台語齒盤設定步驟：入去系統設定
    - description: 點【齒盤】>【加入台語齒盤】>【允准完整取用】
      image: setup-2
      alt: 台語齒盤設定步驟：加入鍵盤
  notes:
    - ※ 無仝牌子 ê 手機仔設定可能無仝，但是啟用方法攏差不多。
    - ※ 「允准完整取用」是予齒盤會當捌你揤 ê 動作，成做你拍 ê 字，請放心，台語齒盤袂偷錄任何資料。

