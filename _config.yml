# =============================================================================
# Content - How to Type Section
# =============================================================================

how_to_type:
  notes:
    - 若拍漢字，會自動使用全形標點符號，拍羅馬字會自動切去半形標點符號，建議的候選詞會顯示佇頂頭，嘛會使褫開看較清楚
    - 點入去齒盤 APP 內底，會看著【齒盤設定】，依你的拍字習慣調整
    - 兩種拍字佈局會當選
  layouts:
    - title: 標準佈局 (Lohankha 齒盤)
      image: qwerty-layout
      alt: 標準佈局 Lohankha 齒盤
    - title: PhahTaigi 佈局
      image: phahtaigi-layout
      alt: PhahTaigi 佈局

# =============================================================================
# Content - How to Use Section
# =============================================================================

how_to_use:
  steps:
    - description: 去【設定】>【一般/系統】>【齒盤】
      image: setup-1
      alt: 台語齒盤設定步驟一：進入系統設定
    - description: 點【齒盤】>【加入台語齒盤】
      image: setup-2
      alt: 台語齒盤設定步驟二：加入鍵盤
    - description: 選【台語齒盤】開始使用
      image: setup-3
      alt: 台語齒盤設定步驟三：開始使用
  notes:
    - ※ 無仝牌子的手機仔設定可能無仝，但是啟用方法攏差不多
    - ※ 「允准完整取用」是予齒盤會當捌你揤 ê 動作，成做你拍 ê 字，台語齒盤袂收集任何資料

